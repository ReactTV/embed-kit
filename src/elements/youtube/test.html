<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube video — embed-kit</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      .embed-wrap {
        margin: 1rem 0;
      }
      youtube-video {
        display: block;
      }
      youtube-video:not(:defined) {
        min-height: 200px;
        background: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
      }
      youtube-video:not(:defined)::before {
        content: "Loading… (use npx serve . if this stays)";
      }
      .server-hint {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>YouTube embed</h1>
    <p class="server-hint">
      If embeds don’t appear, run <code>npx serve .</code> from the project root (ES modules require
      a server).
    </p>
    <h2>Autoplay</h2>
    <div class="embed-wrap" id="yt-autoplay-wrap">
      <youtube-video
        id="yt-autoplay-src"
        autoplay
        width="560"
        height="315"
        title="YouTube video"
        src="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      />
    </div>

    <h2>By URL (<code>src</code>)</h2>
    <div class="embed-wrap">
      <youtube-video
        id="yt-by-src"
        width="560"
        height="315"
        title="YouTube video"
        src="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      />
    </div>
    <h2>By video id (<code>video-id</code>)</h2>
    <div class="embed-wrap">
      <youtube-video
        id="yt-by-id"
        width="560"
        height="315"
        title="YouTube video"
        src="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
      />
    </div>
    <p><a href="../../test/index.html">← Back to test index</a></p>

    <script type="module">
      import "../../../dist/elements/youtube/player.js";
    </script>
  </body>
</html>
