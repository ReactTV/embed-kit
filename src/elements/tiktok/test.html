<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok video — embed-kit</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 42rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.25rem;
      }
      .embed-wrap {
        margin: 1rem 0;
        overflow: hidden;
      }
      tiktok-video {
        display: block;
      }
      tiktok-video:not(:defined) {
        min-height: 200px;
        background: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
      }
      tiktok-video:not(:defined)::before {
        content: "Loading… (use npx serve . if this stays)";
      }
      .server-hint {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>TikTok embed</h1>
    <p class="server-hint">
      If embeds don’t appear, run <code>npx serve .</code> from the project root (ES modules require
      a server).
    </p>
    <h2>Autoplay</h2>
    <div class="embed-wrap" id="tt-autoplay-wrap"></div>
    <button type="button" id="tt-autoplay-btn">Load autoplay video</button>

    <h2>By URL (<code>src</code>)</h2>
    <div class="embed-wrap">
      <tiktok-video
        id="tt-by-src"
        width="325"
        height="575"
        title="TikTok video"
        src="https://www.tiktok.com/player/v1/7531511760524692750"
      />
    </div>
    <h2>By video id (<code>video-id</code>)</h2>
    <div class="embed-wrap">
      <tiktok-video
        id="tt-by-id"
        width="325"
        height="575"
        title="TikTok video"
        src="https://www.tiktok.com/player/v1/7531511760524692750"
      />
    </div>
    <p>
      <small>Edit <code>src/tiktok/constants.ts</code> to use a real TikTok URL or video id.</small>
    </p>
    <p><a href="../../test/index.html">← Back to test index</a></p>

    <script type="module">
      import "../../../dist/elements/tiktok/player.js";
    </script>
  </body>
</html>
